[alembic]
# Chemin vers le dossier des scripts de migration
script_location = alembic

# Format du nom des fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# L'URL de la base de données est lue depuis la variable d'environnement DATABASE_URL
# (définie dans le fichier .env ou dans l'environnement système)
# Ne PAS mettre les identifiants ici — utilisez le fichier .env
sqlalchemy.url = postgresql+psycopg2://user:password@localhost/gestion_stock

# Encodage des fichiers de migration
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
